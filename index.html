<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock-Paper-Scissors Game</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <div class="container">
    <h1>Rock Paper Scissors Game</h1>
    <button id="theme-btn">Dark Mode🌙</button>
    <p>Choose your move:</p>
    <div class="buttons">
        <button id="rock" class="game-btn">&#x1f44a;</button>
        <button id="paper" class="game-btn">&#x1f590;</button>
        <button id="scissors" class="game-btn">&#x270c;</button>
    </div>
    <p id="result">Start the game</p>
    <p id="scores">
        Your Score: <span id="user-score">0</span><br>
        Computer Score: <span id="computer-score">0</span><br>
        Tie score: <span id="tie-score">0</span>
    </p>
    <button id="reset-btn">Reset scores</button>
    <script src="index.js"></script>
</div>
</body>
</html>
